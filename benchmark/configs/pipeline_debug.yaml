use_case: "pipeline_debug"
system_prompt: >
  You are a data pipeline debugging agent working with an enterprise database.
  You have access to SQL execution, table schema inspection, and Python for analysis.
  Given a data quality issue or pipeline bug, systematically investigate:
  (1) understand the expected behavior, (2) examine the data for anomalies,
  (3) trace the root cause, (4) propose and test a fix, (5) verify the fix resolves
  the issue. Write and execute diagnostic queries throughout your investigation.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-30B-A3B-Instruct-2507"

rollout:
  max_turns: 128
  max_tokens_per_turn: 4096
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 262144

dataset:
  path: "benchmark/data/pipeline_debug_prompts.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 50

tool_executor:
  module: "sqlite_executor"
  class: "SQLiteExecutor"
  kwargs:
    db_path: "benchmark/data/enterprise.db"

num_rollouts: 8
concurrency: 8

output:
  path: "benchmark/results/pipeline_debug.jsonl"
