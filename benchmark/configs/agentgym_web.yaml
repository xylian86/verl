use_case: "agentgym_web"
system_prompt: >
  You are a web navigation agent. You can browse the web, click links, fill forms,
  search, and navigate between pages. Complete the given task by interacting with
  web pages step by step. Think carefully about which pages to visit and what
  information to extract.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-30B-A3B-Instruct-2507"

rollout:
  max_turns: 256
  max_tokens_per_turn: 2048
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 262144

dataset:
  path: "benchmark/data/gui_tasks.jsonl"  # reuse GUI tasks for web navigation
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 50

tool_executor:
  module: "web_browsing"
  class: "WebBrowsingExecutor"
  kwargs: {}

num_rollouts: 8
concurrency: 8

output:
  path: "benchmark/results/agentgym_web.jsonl"
