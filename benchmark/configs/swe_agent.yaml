use_case: "swe_agent"
system_prompt: >
  You are an autonomous software engineering agent. You have access to a bash shell
  to explore the repository, read files, edit code, and run tests. Your task is to
  resolve the given GitHub issue. Work methodically: understand the codebase, locate
  the bug, write a fix, and verify with tests.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-30B-A3B-Thinking-2507"

rollout:
  max_turns: 128
  max_tokens_per_turn: 32768
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 262144

dataset:
  path: "benchmark/data/swe_bench.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 64

tool_executor:
  module: "bash_executor"
  class: "BashExecutor"
  kwargs:
    timeout: 30

num_rollouts: 8
concurrency: 64
save_traces: false

output:
  path: "benchmark/results/swe_agent_thinking.jsonl"
