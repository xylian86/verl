use_case: "verl_tool_search"
system_prompt: >
  You are a research agent with access to web search and page reading tools.
  Given a question, search for relevant information across multiple sources,
  read and analyze the content, take notes, and provide a thorough answer.
  Perform iterative searches to refine your understanding.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen/Qwen2.5-3B-Instruct"

rollout:
  max_turns: 30
  max_tokens_per_turn: 2048
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 32000

dataset:
  path: "benchmark/data/hotpotqa.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 50

tool_executor:
  module: "mock_search"
  class: "MockSearchExecutor"
  kwargs:
    max_results: 5
    page_length: 5

concurrency: 8

output:
  path: "benchmark/results/verl_tool_search.jsonl"
