# AgentGym-RL benchmark config
# Source: https://github.com/WooooDyy/AgentGym-RL (ICLR 2026 Oral)
# Environments: WebArena, SearchQA, TextCraft, BabyAI, SciWorld
# Key innovation: ScalingInter-RL — progressively increases interaction horizon
#
# This config runs one environment at a time. Override the tool_executor.kwargs.environment
# field to switch environments:
#   python -m benchmark.rollout_driver.multi_turn_driver \
#     --config benchmark/configs/agentgym_rl.yaml
#
# To run all 5 environments, see benchmark/configs/agentgym_rl_*.yaml or pass --only agentgym_rl
# and the download script generates per-environment data files.

use_case: "agentgym_rl"
system_prompt: >
  You are an autonomous agent operating in an interactive environment. You must
  complete the given task by taking actions step by step. After each action, observe
  the environment state carefully and decide your next action. Think about what
  information you need and plan ahead. When you believe the task is complete,
  use the appropriate completion action.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-30B-A3B-Instruct-2507"

rollout:
  max_turns: 128
  max_tokens_per_turn: 16384
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 262144

dataset:
  path: "benchmark/data/agentgym_rl_tasks.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 64

tool_executor:
  module: "agentgym_executor"
  class: "AgentGymExecutor"
  kwargs:
    environment: "webarena"

num_rollouts: 8
concurrency: 64

output:
  path: "benchmark/results/agentgym_rl.jsonl"
