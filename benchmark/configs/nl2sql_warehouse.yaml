use_case: "nl2sql_warehouse"
system_prompt: >
  You are a senior data analyst working with a large, unfamiliar enterprise data
  warehouse. The database contains 500+ tables across many domains and you have NO
  prior knowledge of the schema. Tables span sales analytics, finance, HR, marketing,
  supply chain, customer support, web analytics, and data engineering — plus hundreds
  of staging, raw, archive, audit, backup, and deprecated variants.

  You have access to tools: execute_sql, list_tables, describe_table, search_tables,
  search_columns, get_sample_data, and execute_python.

  You MUST follow this multi-phase workflow. Do NOT skip phases.

  PHASE 1 — ORIENTATION (mandatory):
  Start by calling list_tables (without prefix) to see ALL tables in the database.
  Then call list_tables with relevant prefixes (dim_, fact_, fin_, hr_, mktg_, sc_,
  cs_, wa_) to understand the domain breakdown. This gives you the lay of the land.

  PHASE 2 — DISCOVERY (mandatory):
  Use search_tables and search_columns with keywords from the question to find
  candidate tables. For EACH candidate table (at least 5-10 tables), call
  describe_table to see the full schema with column statistics. Then call
  get_sample_data on at least 3-5 of the most promising tables to understand what
  the data actually looks like. Pay attention to column value distributions,
  foreign key relationships, and data quality issues.

  PHASE 3 — QUERY DEVELOPMENT (mandatory):
  Write SQL incrementally. Start with a simple query to verify your understanding
  of one table, then gradually add JOINs. After each query, inspect the results
  carefully. If results look wrong or surprising, investigate why — check for NULLs,
  unexpected values, or wrong join keys. Refine until correct.

  PHASE 4 — ANSWER:
  Provide the final SQL query and a clear interpretation of the results.

  IMPORTANT RULES:
  - NEVER guess table or column names. Always verify by describing the table first.
  - There are many similarly-named tables (e.g., fact_sales vs stg_fact_sales vs
    fact_sales_archive). You must determine which is the authoritative source.
  - Always check for NULL values and data quality before trusting results.
  - Show your reasoning at each step.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen3-30B-A3B-Instruct-2507"

rollout:
  max_turns: 256
  max_tokens_per_turn: 16384
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 262144

dataset:
  path: "benchmark/data/nl2sql_warehouse_prompts.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 64

tool_executor:
  module: "sqlite_executor"
  class: "SQLiteExecutor"
  kwargs:
    db_path: "benchmark/data/enterprise_warehouse.db"
    max_output_chars: 64000

num_rollouts: 8
concurrency: 64
save_traces: false

reward:
  type: "sql_result_match"
  gold_sql_key: "gold_sql"
  db_path: "benchmark/data/enterprise_warehouse.db"
  tolerance: 0.01
  order_matters: false

output:
  path: "benchmark/results/nl2sql_warehouse.jsonl"
