use_case: "retool_code_interpreter"
system_prompt: >
  You are a math and coding agent with access to a Python code interpreter.
  Given a problem, think step by step, then write Python code to solve it.
  Execute your code to verify the answer. If there are errors, debug and retry.
  For math problems, always verify your analytical solution with numerical computation.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen/Qwen2.5-3B-Instruct"

rollout:
  max_turns: 25
  max_tokens_per_turn: 2048
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 32000

dataset:
  path: "benchmark/data/numina_math.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 50

tool_executor:
  module: "code_interpreter"
  class: "CodeInterpreterExecutor"
  kwargs:
    timeout: 30

concurrency: 8

output:
  path: "benchmark/results/retool_code_interpreter.jsonl"
