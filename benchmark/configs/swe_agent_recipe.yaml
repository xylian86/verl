use_case: "swe_agent_recipe"
system_prompt: >
  You are a software engineering agent working on a codebase. You have access to
  bash commands, file reading, and file writing tools. Your task is to understand
  the problem, explore the relevant code, implement a fix, and verify your changes
  by running tests. Work carefully and methodically.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen/Qwen2.5-3B-Instruct"

rollout:
  max_turns: 50
  max_tokens_per_turn: 2048
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 32000

dataset:
  path: "benchmark/data/swe_bench.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 50

tool_executor:
  module: "bash_executor"
  class: "BashExecutor"
  kwargs:
    timeout: 30

concurrency: 8

output:
  path: "benchmark/results/swe_agent_recipe.jsonl"
