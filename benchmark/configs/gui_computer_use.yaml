use_case: "gui_computer_use"
system_prompt: >
  You are a computer-use agent that can interact with a graphical user interface.
  You can click elements, type text, scroll, take screenshots, and navigate to URLs.
  Complete the given task by interacting with the GUI step by step. After each action,
  observe the accessibility tree to understand the current state, then decide your next action.

server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen/Qwen2.5-3B-Instruct"

rollout:
  max_turns: 50
  max_tokens_per_turn: 1024
  temperature: 0.7
  top_p: 0.95
  max_context_tokens: 32000

dataset:
  path: "benchmark/data/gui_tasks.jsonl"
  prompt_key: "messages"
  task_id_key: "task_id"
  max_samples: 50

tool_executor:
  module: "gui_simulator"
  class: "GUISimulatorExecutor"
  kwargs: {}

concurrency: 8

output:
  path: "benchmark/results/gui_computer_use.jsonl"
